[server]
# Headless works both locally and in Codex; we won’t hardcode port/address here.
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base="dark"
primaryColor="#60a5fa"
backgroundColor="#111827"
secondaryBackgroundColor="#1f2937"
textColor="#f3f4f6"
